name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Vitest (unit + component)
        run: npm test -- --run

      - name: Build
        run: npx next build
        env:
          # Build-time env shims — real values are populated by Vercel at deploy.
          # The build itself only needs SOMETHING in NEXT_PUBLIC_SUPABASE_URL so
          # createBrowserClient doesn't blow up during static analysis.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Cache Playwright's Chromium download — saves ~30s + bandwidth on
      # repeat runs. Key on the @playwright/test version so cache busts
      # cleanly when the package upgrades.
      - name: Resolve Playwright version
        id: pw-version
        run: |
          PW_VERSION=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers + system deps
        run: npx playwright install --with-deps chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps only (when cache hit)
        run: npx playwright install-deps chromium
        if: steps.pw-cache.outputs.cache-hit == 'true'

      - name: Playwright e2e (desktop + mobile chromium)
        run: npm run test:e2e
        env:
          # Same shims as the build job — the dev server boots inside the
          # webServer block and reads these from process.env.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
