name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test -- --run

      - name: Build
        run: npx next build
        env:
          # Build-time env shims — real values are populated by Vercel at deploy.
          # The build itself only needs SOMETHING in NEXT_PUBLIC_SUPABASE_URL so
          # createBrowserClient doesn't blow up during static analysis.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
